name: Server

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/test_server.yml'

  lint:
    name: "Server: Lint 📝"
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./server
        run: uv sync --frozen

      - name: Lint (ruff check)
        working-directory: ./server
        run: uv run ruff check .

      - name: Format check (ruff format)
        working-directory: ./server
        run: uv run ruff format --check .

  test:
    name: "Server: Tests 🐍"
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SBTB_ENV: testing
      POSTGRES_USER: sbtb
      POSTGRES_PASSWORD: sbtb
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_SESSION_PORT: 5432
      POSTGRES_DB: sbtb_test
      # SUPABASE_URL is optional in Settings but included so any future
      # code that reads it doesn't error. JWKS is mocked in tests — never fetched.
      SUPABASE_URL: "https://placeholder.supabase.co"

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sbtb
          POSTGRES_PASSWORD: sbtb
          POSTGRES_DB: sbtb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./server
        run: uv sync --group test --frozen

      - name: Apply migrations (alembic upgrade head)
        working-directory: ./server
        run: uv run alembic upgrade head

      - name: Check models are in sync (alembic check)
        working-directory: ./server
        run: uv run alembic check

      - name: Run tests (pytest)
        working-directory: ./server
        run: uv run pytest -q