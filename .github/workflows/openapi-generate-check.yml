name: OpenAPI Client Regeneration Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: openapi-generate-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'server/sbtb/**'
              - 'clients/packages/client/src/v1.ts'
              - 'clients/packages/client/package.json'
              - '.github/workflows/openapi-generate-check.yml'

  check:
    name: Check generated client
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 100

      - name: Merge base branch
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git fetch --depth=100 origin ${{ github.event.pull_request.base.ref }}
          if ! git merge --no-edit origin/${{ github.event.pull_request.base.ref }}; then
            git merge --abort
            echo "::error::Could not merge ${{ github.event.pull_request.base.ref }} into the PR cleanly. Please update your branch."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: clients/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: clients/pnpm-lock.yaml

      - name: Install server dependencies
        working-directory: ./server
        run: uv sync --frozen

      - name: Install client dependencies
        working-directory: ./clients
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Regenerate OpenAPI client
        working-directory: ./clients
        run: pnpm generate-api

      - name: Check if v1.ts is stale
        id: stale
        run: |
          if [[ -n "$(git status --porcelain clients/packages/client/src/v1.ts)" ]]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "::warning::clients/packages/client/src/v1.ts is out of date. Run 'pnpm generate-api' in clients/ and commit the result."
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build PR comment body
        id: body
        if: steps.stale.outputs.stale == 'true'
        run: |
          {
            echo 'body<<COMMENT_EOF'
            echo '<!-- __OPENAPI_CLIENT_REGEN -->'
            echo '## Generated OpenAPI Client Out of Date'
            echo ''
            echo '⚠️ **`clients/packages/client/src/v1.ts` is out of date.**'
            echo ''
            echo 'The FastAPI schema has changed but the generated frontend client has not been regenerated. Please run:'
            echo ''
            echo '```bash'
            echo 'cd clients && pnpm generate-api'
            echo '```'
            echo ''
            echo 'and commit the updated `clients/packages/client/src/v1.ts`.'
            echo ''
            echo '<details><summary>Diff</summary>'
            echo ''
            echo '```diff'
            git diff -- clients/packages/client/src/v1.ts
            echo '```'
            echo ''
            echo '</details>'
            echo 'COMMENT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: "<!-- __OPENAPI_CLIENT_REGEN -->"

      - name: Create or update PR comment
        if: steps.stale.outputs.stale == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: ${{ steps.body.outputs.body }}

      - name: Delete resolved comment
        if: steps.stale.outputs.stale == 'false' && steps.fc.outputs.comment-id != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.deleteComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.fc.outputs.comment-id }},
            });

      - name: Fail if generated client is out of date
        if: steps.stale.outputs.stale == 'true'
        run: |
          echo "Generated client is stale. Run 'pnpm generate-api' in clients/ and commit the result."
          exit 1